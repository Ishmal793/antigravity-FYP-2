<!DOCTYPE html>
<html lang="en" data-bs-theme="light">

<head>
    <script>
        const savedTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', savedTheme);
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Career Platform{% endblock %}</title>
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        [data-bs-theme="light"] body {
            background-color: #f8fafc;
            color: #0f172a;
        }

        [data-bs-theme="dark"] body {
            background-color: #0f172a;
            color: #f8fafc;
        }

        .navbar-brand {
            font-weight: 700;
            color: #2563eb !important;
            letter-spacing: -0.5px;
        }

        .auth-card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.01);
            background: var(--bs-body-bg);
            transition: all 0.3s ease;
        }

        [data-bs-theme="dark"] .auth-card {
            background: var(--bs-body-bg);
            border: 1px solid var(--bs-border-color);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .form-control,
        .form-select {
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            border: 1px solid var(--bs-border-color);
            background-color: var(--bs-tertiary-bg);
            color: var(--bs-body-color);
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
            border-color: #2563eb;
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
        }

        .btn-primary {
            background-color: #2563eb;
            border-color: #2563eb;
            border-radius: 0.5rem;
            padding: 0.75rem 1.5rem;
            font-weight: 500;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
            border-color: #1d4ed8;
        }

        .text-muted-custom {
            color: #64748b;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/">
                <i class="bi bi-rocket-takeoff-fill me-2"></i> ElevateCareer
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <ul class="navbar-nav ms-auto align-items-center" id="nav-items-container">
                <!-- Nav items injected via JS -->
            </ul>
            <button class="btn btn-link text-decoration-none ms-lg-3 d-flex align-items-center" id="theme-toggle"
                onclick="toggleTheme()" aria-label="Toggle Theme">
                <i class="bi bi-moon-stars-fill fs-5" id="theme-icon" style="color: inherit;"></i>
            </button>
        </div>
        </div>
    </nav>

    <main class="container py-5">
        {% block content %}{% endblock %}
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function updateNavbar() {
            const token = localStorage.getItem('access');
            const navContainer = document.getElementById('nav-items-container');
            if (token) {
                navContainer.innerHTML = `
                    <li class="nav-item"><a class="nav-link fw-medium" href="/dashboard/">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link fw-medium" href="/profile/">My Profile</a></li>
                    <li class="nav-item ms-lg-3"><button onclick="logout()" class="btn btn-outline-danger btn-sm rounded-pill px-3">Logout</button></li>
                `;
            } else {
                navContainer.innerHTML = `
                    <li class="nav-item"><a class="nav-link fw-medium" href="/login/">Log in</a></li>
                    <li class="nav-item ms-lg-3"><a class="btn btn-primary btn-sm rounded-pill px-4" href="/signup/">Sign up</a></li>
                `;
            }
        }
        function logout() {
            localStorage.removeItem('access');
            localStorage.removeItem('refresh');
            window.location.href = '/login/';
        }

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-bs-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-bs-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeIcon(newTheme);
        }

        function updateThemeIcon(theme) {
            const icon = document.getElementById('theme-icon');
            if (icon) {
                if (theme === 'dark') {
                    icon.className = 'bi bi-sun-fill fs-5 text-warning';
                } else {
                    icon.className = 'bi bi-moon-stars-fill fs-5 text-dark';
                }
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            updateNavbar();
            updateThemeIcon(document.documentElement.getAttribute('data-bs-theme'));
        });
    </script>
    {% block extra_js %}{% endblock %}
</body>

</html>
